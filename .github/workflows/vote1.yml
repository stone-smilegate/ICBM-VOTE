name: 점심 투표 기록
 
on:
  repository_dispatch:
    types: [lunch-vote]

jobs:
  record-vote:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: 투표 댓글 저장 / 수정
        uses: actions/github-script@v7
        with:
          github-token: "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"
          script: |
            const payload = context.payload.client_payload;
            const nickname = payload.nickname;
            const votes    = payload.votes;      // [1, 3] 형태
            const issueNum = parseInt(payload.issue_number);
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;

            if (!nickname || !Array.isArray(votes) || !issueNum) {
              core.setFailed("잘못된 payload");
              return;
            }

            const body =
              "```json\n" +
              JSON.stringify({ type: "lunch_vote", nickname, votes, updated: new Date().toISOString() }, null, 2) +
              "\n```";

            // 기존 댓글 검색 (같은 닉네임)
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: issueNum, per_page: 100
            });

            const existing = comments.find(c => {
              try {
                const m = c.body.match(/```json\s*([\s\S]*?)```/);
                if (!m) return false;
                const d = JSON.parse(m[1]);
                return d.type === "lunch_vote" && d.nickname === nickname;
              } catch { return false; }
            });

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              console.log(`댓글 수정: ${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({ owner, repo, issue_number: issueNum, body });
              console.log(`댓글 생성: ${created.id}`);
            }
