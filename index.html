<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심 투표 - 쏠리드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .subtitle-badge {
    display: inline-block;
    background: #e8f4ff; color: #0071e3;
    font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 10px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; }
  .header p { font-size: 13px; color: #86868b; margin-top: 6px; }
  .total-info { text-align: center; font-size: 13px; color: #86868b; margin-bottom: 8px; }
  .total-info strong { color: #1d1d1f; }
  .card {
    background: white; border-radius: 16px; padding: 18px 20px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 16px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
  .rank { font-size: 22px; font-weight: 800; min-width: 28px; text-align: center; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 16px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
  .meta { font-size: 12px; color: #86868b; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tag { background: #f2f2f7; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #555; font-weight: 500; }
  .dist { font-size: 12px; color: #0071e3; font-weight: 600; }
  .link-btn { font-size: 11px; color: #0071e3; text-decoration: none; }
  .link-btn:hover { text-decoration: underline; }
  .bar-wrap { margin-top: 6px; height: 5px; background: #f2f2f7; border-radius: 10px; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #0071e3, #34aadc); border-radius: 10px; transition: width 0.4s ease; }
  .vote-stat { font-size: 11px; color: #86868b; margin-top: 3px; }
  .voter-list { font-size: 11px; color: #86868b; margin-top: 2px; }
  .voter-list strong { color: #1d1d1f; }
  .btn-vote {
    background: #0071e3; color: white; border: none; border-radius: 50%;
    width: 40px; height: 40px; font-size: 18px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-vote:hover { background: #0077ed; transform: scale(1.08); }
  .btn-vote:active { transform: scale(0.95); }
  .btn-vote.voted { background: #34c759; }
  .btn-vote.pending { background: #ff9500; cursor: wait; }
  .reset-btn {
    display: block; margin: 20px auto 0;
    background: none; border: 1.5px solid #d1d1d6; border-radius: 20px;
    padding: 8px 22px; font-size: 13px; color: #86868b; cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #86868b; color: #1d1d1f; }

  /* 닉네임 모달 */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .modal {
    background: white; border-radius: 20px; padding: 28px 24px;
    width: 100%; max-width: 320px; text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: #86868b; margin-bottom: 20px; line-height: 1.5; }
  .modal input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #d1d1d6; border-radius: 12px;
    font-size: 15px; font-family: inherit; outline: none;
    transition: border-color 0.15s; margin-bottom: 12px;
  }
  .modal input:focus { border-color: #0071e3; }
  .modal-btn {
    width: 100%; padding: 13px;
    background: #0071e3; color: white; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: background 0.15s;
  }
  .modal-btn:hover { background: #0077ed; }

  .status-bar {
    text-align: center; font-size: 12px; color: #86868b;
    margin-bottom: 12px; min-height: 18px;
  }
  .status-bar.error  { color: #ff3b30; }
  .status-bar.saving { color: #ff9500; }
  .status-bar.ok     { color: #34c759; }
</style>
</head>
<body>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>👋 누구세요?</h2>
    <p>투표 전에 이름(닉네임)을<br>입력해 주세요.</p>
    <input type="text" id="nicknameInput" placeholder="예: 김철수" maxlength="12" />
    <button class="modal-btn" id="nicknameSaveBtn">참여하기</button>
  </div>
</div>

<div class="header">
  <div class="subtitle-badge">📍 쏠리드 기준 가까운 순</div>
  <h1>🍽️ 크리에이티브팀어셈블</h1>
  <p>📅 2026년 6월 30일 (화) 오후 6시</p>
  <p style="margin-top:4px;">원하는 곳에 투표하세요! 중복 선택 가능</p>
</div>

<div class="total-info">총 <strong id="totalVotes">0</strong>표 · <span id="voterCount">0</span>명 참여</div>
<div class="status-bar" id="statusBar">불러오는 중...</div>

<div id="cardList"></div>

<button class="reset-btn" onclick="resetVotes()">🔄 내 투표 취소</button>
<p style="text-align:center;font-size:11px;color:#c7c7cc;margin-top:10px;">
  투표는 GitHub에 저장됩니다 · 반영까지 수 초 소요
</p>

<script src="config.js"></script>
<script>
// ── 식당 데이터 ──────────────────────────────
const SOLID_LAT = 37.4015893, SOLID_LNG = 127.1084358;
const restaurants = [
  { id:1, name:"진1926",    tag:"🥩 프렌치랙·양갈비", lat:37.3981361, lng:127.1119978, url:"https://naver.me/5HkaWmAe" },
  { id:2, name:"로스옥",    tag:"🥩 한우",             lat:37.3967169, lng:127.1135877, url:"https://naver.me/5YSr52dO" },
  { id:3, name:"팔복 판교", tag:"🥢 중식",             lat:37.4027741, lng:127.1068214, url:"https://naver.me/GyYblDyJ" },
  { id:4, name:"도원참치",  tag:"🐟 참치",             lat:37.3974044, lng:127.1120122, url:"https://naver.me/FbOvsUC4" },
  { id:5, name:"몽중헌",    tag:"🥢 중식",             lat:37.3949967, lng:127.1125512, url:"https://naver.me/Fio7MPZ4" }
];
const toRad = d => d * Math.PI / 180;
function haversine(a,b,c,d){
  const R=6371000,dL=toRad(c-a),dG=toRad(d-b);
  const x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
restaurants.forEach(r=>{ r.dist=haversine(SOLID_LAT,SOLID_LNG,r.lat,r.lng); });
restaurants.sort((a,b)=>a.dist-b.dist);
const distLabel = m => m<1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km';

// ── 닉네임 ───────────────────────────────────
let myNickname = localStorage.getItem('lv_nick') || '';
const modalBg = document.getElementById('modalBg');
const nicknameInput = document.getElementById('nicknameInput');

document.getElementById('nicknameSaveBtn').onclick = () => {
  const v = nicknameInput.value.trim();
  if (!v) { nicknameInput.focus(); return; }
  myNickname = v;
  localStorage.setItem('lv_nick', v);
  modalBg.style.display = 'none';
  loadVotes();
};
nicknameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('nicknameSaveBtn').click();
});
if (myNickname) modalBg.style.display = 'none';

// ── 상태 ─────────────────────────────────────
let allVotes = {};   // { restaurantId: [{nickname}] }
let myVotes  = JSON.parse(localStorage.getItem('lv_myvotes') || '{}');
let pending  = false;
restaurants.forEach(r => { allVotes[r.id] = []; });

const setStatus = (msg, type='') => {
  const el = document.getElementById('statusBar');
  el.textContent = msg; el.className = 'status-bar' + (type ? ' '+type : '');
};

// ── 읽기: 토큰 없이 공개 API ─────────────────
async function loadVotes() {
  try {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments?per_page=100`;
    const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const comments = await res.json();

    restaurants.forEach(r => { allVotes[r.id] = []; });
    for (const c of comments) {
      try {
        const m = c.body.match(/```json\s*([\s\S]*?)```/);
        if (!m) continue;
        const d = JSON.parse(m[1]);
        if (d.type !== 'lunch_vote' || !Array.isArray(d.votes)) continue;
        for (const id of d.votes) {
          if (allVotes[id] !== undefined) allVotes[id].push({ nickname: d.nickname });
        }
      } catch(_) {}
    }
    setStatus('방금 업데이트됨', 'ok');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) {
    setStatus('불러오기 실패: ' + e.message, 'error');
  }
  render();
}

// ── 쓰기: repository_dispatch → Actions → Issue 댓글 ──
async function saveVotes() {
  if (pending) return;
  pending = true;
  setStatus('저장 중...', 'saving');
  render();

  const votedIds = Object.entries(myVotes)
    .filter(([,v]) => v).map(([id]) => parseInt(id));

  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`,
      {
        method: 'POST',
        headers: { 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event_type: 'lunch-vote',
          client_payload: {
            nickname: myNickname,
            votes: votedIds,
            issue_number: ISSUE_NUMBER
          }
        })
      }
    );
    // 204 = 성공 (응답 본문 없음)
    if (res.status === 204) {
      localStorage.setItem('lv_myvotes', JSON.stringify(myVotes));
      setStatus('전송됨 ✓  반영까지 수 초 소요', 'ok');
      // 10초 후 재조회 (Actions 완료 대기)
      setTimeout(loadVotes, 10000);
    } else if (res.status === 401 || res.status === 403) {
      setStatus('⚠️ SETUP.md의 Secret 설정을 확인하세요', 'error');
    } else {
      throw new Error(`dispatch ${res.status}`);
    }
  } catch(e) {
    setStatus('저장 실패: ' + e.message, 'error');
  }
  pending = false;
  render();
}

// ── 투표 토글 ─────────────────────────────────
function vote(id) {
  if (!myNickname) { modalBg.style.display='flex'; return; }
  if (pending) return;
  myVotes[id] = !myVotes[id];
  // 낙관적 UI 업데이트
  if (myVotes[id]) {
    if (!allVotes[id].find(v => v.nickname === myNickname))
      allVotes[id].push({ nickname: myNickname });
  } else {
    allVotes[id] = allVotes[id].filter(v => v.nickname !== myNickname);
  }
  render();
  saveVotes();
}

function resetVotes() {
  if (pending) return;
  restaurants.forEach(r => {
    myVotes[r.id] = false;
    allVotes[r.id] = allVotes[r.id].filter(v => v.nickname !== myNickname);
  });
  render();
  saveVotes();
}

// ── 렌더링 ────────────────────────────────────
function render() {
  const total = Object.values(allVotes).reduce((a,arr)=>a+arr.length,0);
  const voters = new Set(Object.values(allVotes).flatMap(arr=>arr.map(v=>v.nickname)));
  document.getElementById('totalVotes').textContent = total;
  document.getElementById('voterCount').textContent = voters.size;

  const sorted = [...restaurants].sort((a,b)=>{
    const d = allVotes[b.id].length - allVotes[a.id].length;
    return d !== 0 ? d : a.dist - b.dist;
  });
  const rankEmojis = ['🥇','🥈','🥉'];
  const list = document.getElementById('cardList');
  list.innerHTML = '';

  sorted.forEach((r, idx) => {
    const count  = allVotes[r.id].length;
    const pct    = total > 0 ? Math.round(count/total*100) : 0;
    const voted  = !!myVotes[r.id];
    const names  = allVotes[r.id].map(v =>
      v.nickname === myNickname
        ? `<strong>${v.nickname}</strong>`
        : v.nickname
    ).join(', ');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="rank">${idx < 3 ? rankEmojis[idx] : idx+1}</div>
      <div class="info">
        <div class="name">${r.name}</div>
        <div class="meta">
          <span class="tag">${r.tag}</span>
          <span class="dist">📍 ${distLabel(r.dist)}</span>
          <a class="link-btn" href="${r.url}" target="_blank">네이버지도 →</a>
        </div>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        <div class="vote-stat">${count}표 · ${pct}%</div>
        ${names ? `<div class="voter-list">👤 ${names}</div>` : ''}
      </div>
      <button class="btn-vote ${voted?'voted':''} ${pending?'pending':''}"
              onclick="vote(${r.id})">${voted?'✓':'👍'}</button>
    `;
    list.appendChild(card);
  });
}

// ── 초기 로드 + 30초 자동 갱신 ───────────────
if (myNickname) loadVotes(); else render();
setInterval(() => { if (myNickname) loadVotes(); }, 30000);
</script>
</body>
</html>
