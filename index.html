<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심 투표 - 쏠리드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .subtitle-badge {
    display: inline-block;
    background: #e8f4ff;
    color: #0071e3;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1d1d1f;
  }
  .header p {
    font-size: 13px;
    color: #86868b;
    margin-top: 6px;
  }
  .total-info {
    text-align: center;
    font-size: 13px;
    color: #86868b;
    margin-bottom: 20px;
  }
  .total-info strong { color: #1d1d1f; }
  .card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex;
    align-items: center;
    gap: 16px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  }
  .rank { font-size: 22px; font-weight: 800; min-width: 28px; text-align: center; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 16px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
  .meta { font-size: 12px; color: #86868b; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tag { background: #f2f2f7; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #555; font-weight: 500; }
  .dist { font-size: 12px; color: #0071e3; font-weight: 600; }
  .link-btn { font-size: 11px; color: #0071e3; text-decoration: none; }
  .link-btn:hover { text-decoration: underline; }
  .bar-wrap { margin-top: 6px; height: 5px; background: #f2f2f7; border-radius: 10px; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #0071e3, #34aadc); border-radius: 10px; transition: width 0.4s ease; }
  .vote-stat { font-size: 11px; color: #86868b; margin-top: 3px; }
  .btn-vote {
    background: #0071e3; color: white; border: none; border-radius: 50%;
    width: 40px; height: 40px; font-size: 18px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-vote:hover { background: #0077ed; transform: scale(1.08); }
  .btn-vote:active { transform: scale(0.95); }
  .btn-vote.voted { background: #34c759; }
  .btn-vote:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .reset-btn {
    display: block; margin: 20px auto 0;
    background: none; border: 1.5px solid #d1d1d6; border-radius: 20px;
    padding: 8px 22px; font-size: 13px; color: #86868b; cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #86868b; color: #1d1d1f; }

  /* 닉네임 모달 */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 320px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: #86868b; margin-bottom: 20px; line-height: 1.5; }
  .modal input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #d1d1d6; border-radius: 12px;
    font-size: 15px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: #0071e3; }
  .modal-btn {
    width: 100%; padding: 13px;
    background: #0071e3; color: white;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: background 0.15s;
  }
  .modal-btn:hover { background: #0077ed; }

  /* 상태 메시지 */
  .status-bar {
    text-align: center;
    font-size: 12px;
    color: #86868b;
    margin-bottom: 12px;
    min-height: 18px;
    transition: all 0.2s;
  }
  .status-bar.error { color: #ff3b30; }
  .status-bar.saving { color: #ff9500; }
  .status-bar.ok { color: #34c759; }

  .voter-list {
    font-size: 11px; color: #86868b; margin-top: 3px;
  }

  /* 설정 안내 배너 */
  .setup-banner {
    background: #fff3cd;
    border: 1.5px solid #ffc107;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 12px;
    color: #856404;
    line-height: 1.6;
  }
  .setup-banner strong { display: block; margin-bottom: 4px; font-size: 13px; }
  .setup-banner code {
    background: rgba(0,0,0,0.07);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: monospace;
  }
</style>
</head>
<body>

<!-- 닉네임 입력 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>👋 누구세요?</h2>
    <p>투표에 참여하기 전에<br>이름(또는 닉네임)을 입력해 주세요.</p>
    <input type="text" id="nicknameInput" placeholder="예: 김철수, 철수짱" maxlength="12" />
    <button class="modal-btn" id="nicknameSaveBtn">참여하기</button>
  </div>
</div>

<div class="header">
  <div class="subtitle-badge">📍 쏠리드 기준 가까운 순</div>
  <h1>🍽️ 크리에이티브팀어셈블</h1>
  <p>📅 2026년 6월 30일 (화) 오후 6시</p>
  <p style="margin-top:4px;">원하는 곳에 투표하세요! 중복 선택 가능</p>
</div>

<!-- GitHub 설정 안내 (설정 전에만 표시) -->
<div class="setup-banner" id="setupBanner" style="display:none;">
  ⚠️ <strong>GitHub 연동 설정이 필요합니다</strong>
  <code>config.js</code> 파일에서 <code>GITHUB_TOKEN</code>, <code>REPO_OWNER</code>, <code>REPO_NAME</code>, <code>ISSUE_NUMBER</code>를 채워주세요. 자세한 방법은 <code>SETUP.md</code>를 확인하세요.
</div>

<div class="total-info">총 <strong id="totalVotes">0</strong>표 · <span id="voterCount">0</span>명 참여</div>
<div class="status-bar" id="statusBar">불러오는 중...</div>

<div id="cardList"></div>

<button class="reset-btn" onclick="resetVotes()">🔄 내 투표 취소</button>
<p style="text-align:center;font-size:11px;color:#c7c7cc;margin-top:10px;">투표는 브라우저에 저장됩니다 · 실시간 반영</p>

<!-- config.js에서 토큰·레포 정보 로드 -->
<script src="config.js"></script>

<script>
// ────────────────────────────────────────────
// 거리 계산
// ────────────────────────────────────────────
const SOLID_LAT = 37.4015893;
const SOLID_LNG = 127.1084358;

const restaurants = [
  { id: 1, name: "진1926",    tag: "🥩 프렌치랙 · 양갈비", lat: 37.3981361, lng: 127.1119978, url: "https://naver.me/5HkaWmAe" },
  { id: 2, name: "로스옥",    tag: "🥩 한우",               lat: 37.3967169, lng: 127.1135877, url: "https://naver.me/5YSr52dO" },
  { id: 3, name: "팔복 판교", tag: "🥢 중식",               lat: 37.4027741, lng: 127.1068214, url: "https://naver.me/GyYblDyJ" },
  { id: 4, name: "도원참치",  tag: "🐟 참치",               lat: 37.3974044, lng: 127.1120122, url: "https://naver.me/FbOvsUC4" },
  { id: 5, name: "몽중헌",    tag: "🥢 중식",               lat: 37.3949967, lng: 127.1125512, url: "https://naver.me/Fio7MPZ4" }
];

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function distLabel(m) {
  return m < 1000 ? Math.round(m) + 'm' : (m/1000).toFixed(1) + 'km';
}
restaurants.forEach(r => { r.dist = haversine(SOLID_LAT, SOLID_LNG, r.lat, r.lng); });
restaurants.sort((a, b) => a.dist - b.dist);

// ────────────────────────────────────────────
// 닉네임 관리
// ────────────────────────────────────────────
let myNickname = localStorage.getItem('lunch_vote_nickname') || '';
const modalBg = document.getElementById('modalBg');
const nicknameInput = document.getElementById('nicknameInput');
const nicknameSaveBtn = document.getElementById('nicknameSaveBtn');

function openModal() { modalBg.style.display = 'flex'; nicknameInput.focus(); }
function closeModal() { modalBg.style.display = 'none'; }

nicknameSaveBtn.onclick = () => {
  const v = nicknameInput.value.trim();
  if (!v) { nicknameInput.focus(); return; }
  myNickname = v;
  localStorage.setItem('lunch_vote_nickname', v);
  closeModal();
  loadVotes();
};
nicknameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nicknameSaveBtn.click(); });

if (!myNickname) { openModal(); } else { closeModal(); }

// ────────────────────────────────────────────
// GitHub API 헬퍼
// ────────────────────────────────────────────
// config.js에서 주입: GITHUB_TOKEN, REPO_OWNER, REPO_NAME, ISSUE_NUMBER
const isConfigured = () =>
  typeof GITHUB_TOKEN !== 'undefined' && GITHUB_TOKEN &&
  typeof REPO_OWNER !== 'undefined' && REPO_OWNER &&
  typeof REPO_NAME  !== 'undefined' && REPO_NAME &&
  typeof ISSUE_NUMBER !== 'undefined' && ISSUE_NUMBER;

const API_BASE = () =>
  `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`;

const GH_HEADERS = () => ({
  'Authorization': `Bearer ${GITHUB_TOKEN}`,
  'Accept': 'application/vnd.github+json',
  'Content-Type': 'application/json'
});

// ────────────────────────────────────────────
// 투표 상태
// ────────────────────────────────────────────
// 로컬: { restaurantId: voted (bool) }
let myVotes = JSON.parse(localStorage.getItem('lunch_vote_myvotes') || '{}');
// 전체: { restaurantId: [ {nickname, commentId?} ] }
let allVotes = {};
restaurants.forEach(r => { allVotes[r.id] = []; });
let myCommentId = parseInt(localStorage.getItem('lunch_vote_commentid') || '0');

function setStatus(msg, type = '') {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

// ────────────────────────────────────────────
// 데이터 로드
// ────────────────────────────────────────────
async function loadVotes() {
  if (!isConfigured()) {
    document.getElementById('setupBanner').style.display = 'block';
    setStatus('⚠️ config.js 설정이 필요합니다', 'error');
    render();
    return;
  }
  try {
    const res = await fetch(API_BASE() + '?per_page=100', { headers: GH_HEADERS() });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const comments = await res.json();

    // 초기화
    restaurants.forEach(r => { allVotes[r.id] = []; });

    for (const c of comments) {
      try {
        // 댓글 본문: JSON 블록만 파싱
        const match = c.body.match(/```json\s*([\s\S]*?)```/);
        if (!match) continue;
        const data = JSON.parse(match[1]);
        if (data.type !== 'lunch_vote') continue;
        const nick = data.nickname;
        const voted = data.votes; // [1, 3, 5] 형태
        if (!Array.isArray(voted)) continue;
        for (const id of voted) {
          if (allVotes[id] !== undefined) {
            allVotes[id].push({ nickname: nick, commentId: c.id });
          }
        }
        // 내 댓글 식별
        if (nick === myNickname) myCommentId = c.id;
      } catch(_) { /* 파싱 실패 무시 */ }
    }
    setStatus('방금 업데이트됨', 'ok');
    setTimeout(() => setStatus(''), 2000);
    render();
  } catch(e) {
    setStatus('불러오기 실패: ' + e.message, 'error');
    render();
  }
}

// ────────────────────────────────────────────
// 투표 저장 (GitHub comment upsert)
// ────────────────────────────────────────────
async function saveVotes() {
  if (!isConfigured()) return;
  const votedIds = Object.entries(myVotes)
    .filter(([, v]) => v)
    .map(([id]) => parseInt(id));

  const body = '```json\n' + JSON.stringify({
    type: 'lunch_vote',
    nickname: myNickname,
    votes: votedIds,
    updated: new Date().toISOString()
  }, null, 2) + '\n```';

  try {
    setStatus('저장 중...', 'saving');
    let res;
    if (myCommentId) {
      // 기존 댓글 수정
      res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${myCommentId}`, {
        method: 'PATCH',
        headers: GH_HEADERS(),
        body: JSON.stringify({ body })
      });
    } else {
      // 새 댓글 생성
      res = await fetch(API_BASE(), {
        method: 'POST',
        headers: GH_HEADERS(),
        body: JSON.stringify({ body })
      });
    }
    if (!res.ok) throw new Error(`저장 실패 ${res.status}`);
    const data = await res.json();
    myCommentId = data.id;
    localStorage.setItem('lunch_vote_commentid', myCommentId);
    localStorage.setItem('lunch_vote_myvotes', JSON.stringify(myVotes));
    setStatus('저장됨 ✓', 'ok');
    setTimeout(() => setStatus(''), 2000);
    await loadVotes();
  } catch(e) {
    setStatus('저장 실패: ' + e.message, 'error');
  }
}

// ────────────────────────────────────────────
// 투표 토글
// ────────────────────────────────────────────
function vote(id) {
  if (!myNickname) { openModal(); return; }
  myVotes[id] = !myVotes[id];
  // 로컬 낙관적 업데이트
  if (myVotes[id]) {
    if (!allVotes[id].find(v => v.nickname === myNickname))
      allVotes[id].push({ nickname: myNickname });
  } else {
    allVotes[id] = allVotes[id].filter(v => v.nickname !== myNickname);
  }
  render();
  saveVotes();
}

function resetVotes() {
  restaurants.forEach(r => { myVotes[r.id] = false; });
  restaurants.forEach(r => {
    allVotes[r.id] = allVotes[r.id].filter(v => v.nickname !== myNickname);
  });
  render();
  saveVotes();
}

// ────────────────────────────────────────────
// 렌더링
// ────────────────────────────────────────────
function render() {
  const totalVoteCount = Object.values(allVotes).reduce((a, arr) => a + arr.length, 0);
  const allVoters = new Set(Object.values(allVotes).flatMap(arr => arr.map(v => v.nickname)));
  document.getElementById('totalVotes').textContent = totalVoteCount;
  document.getElementById('voterCount').textContent = allVoters.size;

  const list = document.getElementById('cardList');
  list.innerHTML = '';
  const rankEmojis = ['🥇','🥈','🥉'];

  // 득표 수 내림차순 정렬 (거리 보조)
  const sorted = [...restaurants].sort((a, b) => {
    const diff = allVotes[b.id].length - allVotes[a.id].length;
    return diff !== 0 ? diff : a.dist - b.dist;
  });

  sorted.forEach((r, idx) => {
    const count = allVotes[r.id].length;
    const pct = totalVoteCount > 0 ? Math.round(count / totalVoteCount * 100) : 0;
    const voted = !!myVotes[r.id];
    const rankStr = idx < 3 ? rankEmojis[idx] : (idx+1);
    const voterNames = allVotes[r.id].map(v =>
      v.nickname === myNickname ? `<strong>${v.nickname}</strong>` : v.nickname
    ).join(', ');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="rank">${rankStr}</div>
      <div class="info">
        <div class="name">${r.name}</div>
        <div class="meta">
          <span class="tag">${r.tag}</span>
          <span class="dist">📍 ${distLabel(r.dist)}</span>
          <a class="link-btn" href="${r.url}" target="_blank">네이버지도 →</a>
        </div>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        <div class="vote-stat">${count}표 · ${pct}%</div>
        ${voterNames ? `<div class="voter-list">👤 ${voterNames}</div>` : ''}
      </div>
      <button class="btn-vote ${voted ? 'voted' : ''}" onclick="vote(${r.id})">${voted ? '✓' : '👍'}</button>
    `;
    list.appendChild(card);
  });
}

// ────────────────────────────────────────────
// 초기 로드 + 30초 자동 갱신
// ────────────────────────────────────────────
if (myNickname) loadVotes(); else render();
setInterval(() => { if (myNickname && isConfigured()) loadVotes(); }, 30000);
</script>
</body>
</html>
